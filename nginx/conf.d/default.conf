# ============================================================
# HTTPS config — bajacall.com
# SSL certificates issued by Let's Encrypt via Certbot
# ============================================================

resolver 127.0.0.11 valid=30s ipv6=off;

# ---------------------------------------------------------------
# Redirect all HTTP → HTTPS
# ---------------------------------------------------------------
server {
    listen 80;
    server_name bajacall.com api.bajacall.com dashboard.bajacall.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------
# api.bajacall.com → FastAPI backend
# ---------------------------------------------------------------
server {
    listen 443 ssl;
    server_name api.bajacall.com;

    ssl_certificate     /etc/letsencrypt/live/bajacall.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bajacall.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /health {
        return 200 '{"status":"ok","service":"api"}';
        add_header Content-Type application/json;
    }

    location / {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# ---------------------------------------------------------------
# bajacall.com + dashboard.bajacall.com → Next.js dashboard
# ---------------------------------------------------------------
server {
    listen 443 ssl;
    server_name bajacall.com dashboard.bajacall.com;

    ssl_certificate     /etc/letsencrypt/live/bajacall.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bajacall.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location / {
        set $dashboard_upstream http://dashboard:3000;
        proxy_pass $dashboard_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
