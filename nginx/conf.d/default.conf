# ============================================================
# Phase 0: HTTP-only config for initial SSL certificate issuance
# After Task 8 Step 5, HTTPS blocks will be appended manually.
# ============================================================

# Use Docker's internal DNS resolver so upstreams are resolved
# lazily at request time (not at nginx startup).
resolver 127.0.0.11 valid=30s ipv6=off;

# --- api.yourdomain.com → FastAPI backend ---
server {
    listen 80;
    server_name api.yourdomain.com;

    # Used by Certbot for domain verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /health {
        return 200 '{"status":"ok","service":"api"}';
        add_header Content-Type application/json;
    }

    location / {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- yourdomain.com and dashboard.yourdomain.com → Next.js dashboard ---
server {
    listen 80;
    server_name yourdomain.com dashboard.yourdomain.com;

    # Used by Certbot for domain verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location / {
        set $dashboard_upstream http://dashboard:3000;
        proxy_pass $dashboard_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
